<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Scene 06 - CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px;
  background: #0d0e12;
  font-family: 'Inter', sans-serif;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.bg-glow {
  position: absolute; width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(34,197,94,0.12) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.content { text-align: center; z-index: 1; }
.logo {
  display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px;
}
.logo-icon {
  width: 56px; height: 56px; border-radius: 14px;
  background: #22c55e; display: flex; align-items: center; justify-content: center;
}
.logo-icon svg { width: 28px; height: 28px; color: #09090b; }
.logo-text { font-size: 32px; font-weight: 800; color: #fff; }
.logo-text span { color: #22c55e; }
h1 {
  font-size: 56px; font-weight: 800; color: #fff; line-height: 1.15;
  margin-bottom: 12px;
}
.sub {
  font-size: 22px; color: #a1a1aa; margin-bottom: 36px;
}
.cta-button {
  display: inline-block; padding: 16px 48px; border-radius: 14px;
  background: #22c55e; color: #09090b; font-size: 22px; font-weight: 700;
  text-decoration: none;
}
.url {
  margin-top: 24px; font-size: 18px; color: #52525b; font-weight: 600;
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="content">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3L12 9L18 3M12 9V21"/></svg>
    </div>
    <div class="logo-text">Barber<span>Plan</span></div>
  </div>
  <h1>Pronto para transformar<br>sua barbearia?</h1>
  <p class="sub">Comece grátis em menos de 2 minutos.</p>
  <a class="cta-button" href="#">→ Começar Agora</a>
  <div class="url">barberplan-nine.vercel.app</div>
</div>
</body>
</html>
