<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Scene 03 - Magic Moment</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1920px; height: 1080px;
  background: #0d0e12;
  font-family: 'Inter', sans-serif;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.bg-glow {
  position: absolute; width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(74,222,128,0.12) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
}
.content { text-align: center; z-index: 1; }
.icon-wrap {
  width: 80px; height: 80px; border-radius: 20px;
  background: rgba(74,222,128,0.15);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
}
.icon-wrap svg { width: 40px; height: 40px; color: #4ade80; }
h1 {
  font-size: 64px; font-weight: 800; color: #fff; line-height: 1.15;
  margin-bottom: 16px;
}
h1 span { color: #4ade80; }
.sub {
  font-size: 26px; color: #a1a1aa; margin-bottom: 40px;
}
.mockup {
  display: inline-flex; gap: 24px; align-items: center;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px; padding: 24px 40px;
}
.mockup-step {
  text-align: center;
}
.mockup-step .num {
  width: 40px; height: 40px; border-radius: 10px;
  background: rgba(74,222,128,0.15); color: #4ade80;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; margin: 0 auto 8px;
}
.mockup-step p { font-size: 14px; color: #a1a1aa; }
.arrow { font-size: 24px; color: #52525b; }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="content">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  </div>
  <h1>Agendamento online em<br><span>3 cliques</span></h1>
  <p class="sub">Seu cliente agenda direto pelo link da sua barbearia</p>
  <div class="mockup">
    <div class="mockup-step">
      <div class="num">1</div>
      <p>Escolhe o serviço</p>
    </div>
    <span class="arrow">→</span>
    <div class="mockup-step">
      <div class="num">2</div>
      <p>Seleciona o barbeiro</p>
    </div>
    <span class="arrow">→</span>
    <div class="mockup-step">
      <div class="num">3</div>
      <p>Confirma o horário</p>
    </div>
  </div>
</div>
</body>
</html>
