<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Scene 01 - Landing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:#09090b;font-family:'Inter',system-ui,sans-serif;overflow:hidden}
.hero{position:relative;width:100%;height:100vh;display:flex;align-items:center;justify-content:center}
.hero-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1599351431202-1e0f0130c4b1?w=1920&q=80') center/cover;filter:brightness(.25)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(9,9,11,.4) 0%,rgba(9,9,11,.95) 100%)}
.content{position:relative;z-index:1;text-align:center;max-width:800px;padding:0 40px}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:24px}
.logo-icon{width:52px;height:52px;border-radius:14px;background:#22c55e;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:26px;height:26px;color:#09090b}
.logo-text{font-size:36px;font-weight:800;color:#fff}
.logo-text span{color:#22c55e}
h1{font-size:68px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:20px}
h1 span{color:#22c55e}
p{font-size:24px;color:#a1a1aa;margin-bottom:40px;line-height:1.5}
.btn{display:inline-block;padding:16px 48px;border-radius:14px;background:#22c55e;color:#09090b;font-size:20px;font-weight:700;text-decoration:none}
.stats{display:flex;gap:32px;justify-content:center;margin-top:48px}
.stat{text-align:center}
.stat-num{font-size:28px;font-weight:800;color:#fff}
.stat-label{font-size:14px;color:#52525b;margin-top:4px}
</style></head><body>
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="content">
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3L12 9L18 3M12 9V21"/></svg></div>
      <div class="logo-text">Barber<span>Plan</span></div>
    </div>
    <h1>Barbearia<br><span>Vintage Club</span></h1>
    <p>Tradição e estilo no mesmo lugar. Agende seu horário<br>e venha viver a experiência de uma barbearia clássica.</p>
    <a class="btn" href="#">Agendar Horário</a>
    <div class="stats">
      <div class="stat"><div class="stat-num">4.9</div><div class="stat-label">★★★★★</div></div>
      <div class="stat"><div class="stat-num">12</div><div class="stat-label">Profissionais</div></div>
      <div class="stat"><div class="stat-num">500+</div><div class="stat-label">Clientes</div></div>
    </div>
  </div>
</div>
<div style="position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#52525b;font-size:14px;font-family:'Inter',sans-serif">barberplan-nine.vercel.app</div>
</body></html>
