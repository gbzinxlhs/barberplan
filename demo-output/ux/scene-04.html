<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Scene 04 - Choose Barber</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:#09090b;font-family:'Inter',system-ui,sans-serif;overflow:hidden;padding:40px 80px}
.header{display:flex;align-items:center;justify-content:space-between;padding:0 0 20px 0;border-bottom:1px solid #27272a;margin-bottom:32px}
.header-left{display:flex;align-items:center;gap:12px}
.avatar{width:36px;height:36px;border-radius:10px;background:#22c55e;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#09090b}
.header-name{font-size:18px;font-weight:700;color:#fff}
.user-info{display:flex;align-items:center;gap:10px;padding:0 0 16px 0;border-bottom:1px solid #27272a;margin-bottom:24px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:#27272a;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.user-name{color:#fff;font-size:14px;font-weight:500}
.user-phone{color:#52525b;font-size:12px}
.steps{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.step{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:#22c55e;color:#09090b}
.step.inactive{background:#27272a;color:#52525b}
.step-line{flex:1;height:2px;background:#22c55e;border-radius:1px}
.step-line.inactive{background:#27272a}
.title{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.title svg{width:22px;height:22px;color:#22c55e}
.title h2{font-size:24px;font-weight:700;color:#fff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:700px}
.card{display:flex;align-items:center;gap:16px;border-radius:14px;padding:18px 20px;border:2px solid #22c55e;background:#18181b;cursor:pointer}
.card-img{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff}
.bg-blue{background:#3b82f6}
.bg-emerald{background:#10b981}
.bg-purple{background:#8b5cf6}
.card-name{color:#fff;font-weight:600;font-size:17px;margin-bottom:2px}
.card-bio{color:#52525b;font-size:13px}
.back{display:flex;align-items:center;gap:6px;color:#52525b;font-size:14px;margin-top:24px;cursor:pointer;background:none;border:none}
.back svg{width:14px;height:14px}
.back:hover{color:#fff}
.continue{display:flex;justify-content:flex-end;margin-top:-32px}
.continue-btn{background:#22c55e;color:#09090b;padding:12px 32px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer}
</style></head><body>
<div class="header">
  <div class="header-left">
    <div class="avatar">V</div>
    <div class="header-name">Vintage Club</div>
  </div>
</div>
<div class="user-info">
  <div class="user-avatar">G</div>
  <div>
    <div class="user-name">Gabriel Santos</div>
    <div class="user-phone">(85) 99999-1234</div>
  </div>
</div>
<div class="steps">
  <div class="step">✓</div>
  <div class="step-line"></div>
  <div class="step">2</div>
  <div class="step-line"></div>
  <div class="step inactive">3</div>
  <div class="step-line inactive"></div>
  <div class="step inactive">4</div>
  <div class="step-line inactive"></div>
  <div class="step inactive">5</div>
</div>
<div class="title">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
  <h2>Escolha o Barbeiro</h2>
</div>
<div class="grid">
  <div class="card">
    <div class="card-img bg-blue">RM</div>
    <div>
      <div class="card-name">Ricardo Menezes</div>
      <div class="card-bio">Especialista em degradê e barba desenhada</div>
    </div>
  </div>
  <div class="card" style="border-color:#52525b;border-width:1px">
    <div class="card-img bg-emerald">PL</div>
    <div>
      <div class="card-name">Paulo Lima</div>
      <div class="card-bio">Corte clássico e navalha</div>
    </div>
  </div>
  <div class="card" style="border-color:#52525b;border-width:1px">
    <div class="card-img bg-purple">AF</div>
    <div>
      <div class="card-name">André Ferreira</div>
      <div class="card-bio">Hidratação e tratamentos capilares</div>
    </div>
  </div>
  <div class="card" style="border-color:#52525b;border-width:1px">
    <div class="card-img" style="background:#f59e0b">LS</div>
    <div>
      <div class="card-name">Lucas Silva</div>
      <div class="card-bio">Barbearia tradicional e infantil</div>
    </div>
  </div>
</div>
<button class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Voltar</button>
<div class="continue"><button class="continue-btn">Continuar</button></div>
</body></html>
