<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Scene 06 - Success</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:#09090b;font-family:'Inter',system-ui,sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card{background:#18181b;border:1px solid #27272a;border-radius:24px;padding:56px 48px;max-width:560px;width:100%;text-align:center;position:relative;overflow:hidden}
.check{width:72px;height:72px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.check svg{width:36px;height:36px;color:#09090b}
h1{font-size:28px;font-weight:800;color:#fff;margin-bottom:8px}
.sub{color:#a1a1aa;font-size:16px;margin-bottom:6px}
.detail{color:#52525b;font-size:14px;margin-bottom:32px;line-height:1.6}
.btn-primary{display:block;width:100%;background:#22c55e;color:#09090b;padding:14px;border-radius:14px;font-size:15px;font-weight:600;border:none;cursor:pointer;margin-bottom:10px}
.btn-secondary{display:block;width:100%;background:transparent;color:#52525b;padding:14px;border-radius:14px;font-size:15px;font-weight:500;border:none;cursor:pointer}
.btn-secondary:hover{color:#fff}
.deco{position:absolute;width:120px;opacity:.04;pointer-events:none}
.deco1{top:-20px;right:-20px}
.deco2{bottom:-30px;left:-30px;transform:rotate(45deg)}
</style></head><body>
<div class="card">
  <div class="deco deco1"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 3L12 9L18 3M12 9V21"/></svg></div>
  <div class="deco deco2"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 3L12 9L18 3M12 9V21"/></svg></div>
  <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg></div>
  <h1>Agendamento Confirmado!</h1>
  <div class="sub">Corte Degrade com Ricardo Menezes</div>
  <div class="detail">
    Terça, 08 de Julho de 2026<br>
    &agrave;s 11:00 — Duração: 40 min<br>
    Pagamento: Pix<br>
    <strong style="color:#22c55e">Valor: R$ 45,00</strong>
  </div>
  <button class="btn-primary">Meus Agendamentos</button>
  <button class="btn-secondary">Novo Agendamento</button>
</div>
<div style="position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:#52525b;font-size:14px;font-family:'Inter',sans-serif">barberplan-nine.vercel.app/demo</div>
</body></html>
